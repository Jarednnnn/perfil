<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared's Realm | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans'; margin: 0; }
        .chat-wrapper { max-width: 900px; margin: 2rem auto; padding: 20px; position: relative; z-index: 10; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(133,85,255,0.3); padding-bottom: 1rem; }
        #chat-box { height: 60vh; overflow-y: auto; background: rgba(10,10,30,0.6); border: 1px solid rgba(133,85,255,0.2); border-radius: 15px; padding: 20px; margin: 1.5rem 0; display: flex; flex-direction: column; gap: 10px; backdrop-filter: blur(10px); }
        .message { padding: 10px 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border-left: 4px solid #8555ff; max-width: 80%; }
        .message b { color: #8555ff; display: block; font-size: 0.8rem; text-transform: uppercase; }
        .input-area { display: flex; gap: 10px; }
        #message-input { flex: 1; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; transition: 0.3s; }
        #message-input:focus { border-color: #8555ff; }
        #send-btn { padding: 0 25px; background: #8555ff; border: none; color: #fff; border-radius: 12px; cursor: pointer; font-weight: 800; }
        #logout-btn { background: #ff4d4d; border: none; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="particles-js" style="position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1;"></div>
    
    <div class="chat-wrapper">
        <header>
            <div>
                <h1 style="margin:0; font-size: 1.5rem;"><i class="fas fa-ghost"></i> Realm Chat</h1>
                <span id="user-tag" style="font-size: 0.8rem; color: #8555ff;"></span>
            </div>
            <button id="logout-btn"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </header>

        <div id="chat-box">
            </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Escribe un mensaje en el Realm...">
            <button id="send-btn">ENVIAR</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script>
        const session = JSON.parse(sessionStorage.getItem('jared_realm_session'));
        if (session) {
            document.getElementById('user-tag').textContent = "Operador: " + session.displayName;

            const chatBox = document.getElementById('chat-box');
            const input = document.getElementById('message-input');
            const btn = document.getElementById('send-btn');

            // Función para renderizar mensajes
            const appendMessage = (user, content) => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `<b>${user}</b> <span>${content}</span>`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            };

            // Cargar mensajes iniciales y escuchar cambios
            const loadMessages = async () => {
                const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true });
                if (data) data.forEach(m => appendMessage(m.username, m.content));
            };
            loadMessages();

            // Suscribirse a tiempo real (Opcional, requiere configuración en Supabase)
            _supabase.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new.username, payload.new.content);
            }).subscribe();

            btn.onclick = async () => {
                const val = input.value.trim();
                if (val) {
                    await window.saveMessage(session.displayName, val);
                    input.value = '';
                }
            };

            input.onkeypress = (e) => { if(e.key === 'Enter') btn.click(); };
        }
    </script>
</body>
</html>
