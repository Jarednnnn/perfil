<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared's Realm | Global Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans'; margin: 0; overflow: hidden; }
        .chat-wrapper { max-width: 1000px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; position: relative; z-index: 10; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(133,85,255,0.2); }
        #chat-box { flex: 1; overflow-y: auto; margin: 20px 0; padding: 10px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* Estilos de mensajes */
        .msg { padding: 12px 16px; border-radius: 15px; background: rgba(20,20,40,0.7); border: 1px solid rgba(133,85,255,0.1); max-width: 80%; animation: slideIn 0.3s ease; }
        .msg.ai-msg { border-left: 4px solid #00f2ff; background: rgba(0, 242, 255, 0.05); }
        .msg.my-msg { align-self: flex-end; border-right: 4px solid #8555ff; background: rgba(133,85,255,0.1); }
        .msg b { color: #8555ff; font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .msg.ai-msg b { color: #00f2ff; }
        
        .input-area { display: flex; gap: 10px; background: rgba(10,10,20,0.8); padding: 15px; border-radius: 15px; border: 1px solid rgba(133,85,255,0.3); }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 1rem; }
        #send-btn { background: #8555ff; border: none; color: #fff; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        #send-btn:hover { transform: scale(1.05); background: #9d75ff; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="particles-js" style="position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1;"></div>
    
    <div class="chat-wrapper">
        <header>
            <div>
                <h2 style="margin:0; font-size: 1.2rem; color: #8555ff;"><i class="fas fa-globe"></i> GLOBAL_REALM</h2>
                <span id="user-display" style="font-size: 0.8rem; opacity: 0.6;"></span>
            </div>
            <button id="logout-btn" style="background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); color:#ff4d4d; padding:8px 15px; border-radius:10px; cursor:pointer;">Salir</button>
        </header>

        <div id="chat-box">
            </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Escribe un mensaje o usa /albert para la IA...">
            <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script>
        const session = JSON.parse(sessionStorage.getItem('jared_realm_session'));
        if (!session) { window.location.href = 'login.html'; }
        
        document.getElementById('user-display').textContent = `Conectado como: ${session.displayName}`;
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        const btn = document.getElementById('send-btn');

        // RENDERIZAR MENSAJES
        function renderMsg(user, text, isAi = false) {
            const div = document.createElement('div');
            const isMe = user === session.displayName;
            div.className = `msg ${isAi ? 'ai-msg' : ''} ${isMe ? 'my-msg' : ''}`;
            div.innerHTML = `<b>${user}</b> <div>${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 1. CARGAR HISTORIAL GLOBAL
        async function fetchHistory() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) data.forEach(m => renderMsg(m.username, m.content, m.username === 'Albert AI'));
        }
        fetchHistory();

        // 2. ESCUCHAR TIEMPO REAL (Para que todos vean los mensajes al instante)
        _supabase.channel('global-realm')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const { username, content } = payload.new;
                // Si el mensaje ya lo renderizamos nosotros al enviar, no duplicarlo
                const lastMsg = chatBox.lastElementChild?.innerText;
                if (!lastMsg || !lastMsg.includes(content)) {
                    renderMsg(username, content, username === 'Albert AI');
                }
            }).subscribe();

        // 3. LÓGICA DE ENVÍO Y COMANDO /ALBERT
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Enviar mensaje del usuario a Supabase
            await window.saveMessage(session.displayName, text);
            renderMsg(session.displayName, text);
            input.value = '';

            // Detectar si llama a la IA
            if (text.toLowerCase().startsWith('/albert')) {
                const query = text.replace('/albert', '').trim();
                
                // Efecto de "escribiendo"
                const typingDiv = document.createElement('div');
                typingDiv.className = 'msg ai-msg';
                typingDiv.innerHTML = `<b>Albert AI</b> <i class="fas fa-spinner fa-spin"></i> Pensando...`;
                chatBox.appendChild(typingDiv);

                try {
                    // AQUÍ LLAMAMOS A LA IA
                    // Como no tengo tu API Key, simulo la respuesta. 
                    // Si tienes un endpoint de OpenAI o similar, reemplaza este fetch.
                    setTimeout(async () => {
                        const aiResponse = "¡Hola! Soy Albert, la IA de este Reino. He recibido tu mensaje: " + (query || "estoy listo para ayudar.");
                        typingDiv.remove();
                        await window.saveMessage('Albert AI', aiResponse);
                        renderMsg('Albert AI', aiResponse, true);
                    }, 1500);
                } catch (e) {
                    typingDiv.innerText = "Error en el núcleo de Albert.";
                }
            }
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
