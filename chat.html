<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared's Realm | Global Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html { height: 100%; margin: 0; background: #000; color: #fff; font-family: 'Plus Jakarta Sans'; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; }

        /* CENTRADO TOTAL DEL CHAT */
        .main-container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%; padding: 20px; box-sizing: border-box;
        }

        .chat-card {
            width: 100%; max-width: 800px; height: 85vh;
            background: rgba(10, 10, 25, 0.85);
            border: 1px solid rgba(133, 85, 255, 0.3);
            border-radius: 24px;
            display: flex; flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        header { padding: 20px; border-bottom: 1px solid rgba(133, 85, 255, 0.2); display: flex; justify-content: space-between; align-items: center; }
        
        /* CONTENEDOR DE MENSAJES CON SCROLL */
        #chat-box {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: thin; scrollbar-color: #8555ff transparent;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #8555ff; border-radius: 10px; }

        .msg { padding: 12px 16px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); max-width: 85%; align-self: flex-start; }
        .msg.my-msg { align-self: flex-end; border-color: rgba(133, 85, 255, 0.4); background: rgba(133, 85, 255, 0.1); border-right: 4px solid #8555ff; }
        .msg.ai-msg { border-left: 4px solid #00f2ff; background: rgba(0, 242, 255, 0.05); }
        .msg b { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; color: #8555ff; }
        .msg.ai-msg b { color: #00f2ff; }

        .input-area { padding: 20px; border-top: 1px solid rgba(133, 85, 255, 0.2); display: flex; gap: 12px; }
        #message-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid #333; border-radius: 14px; padding: 14px; color: #fff; outline: none; transition: 0.3s; }
        #message-input:focus { border-color: #8555ff; }
        #send-btn { width: 50px; height: 50px; background: #8555ff; border: none; border-radius: 14px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="main-container">
        <div class="chat-card">
            <header>
                <div>
                    <h2 style="margin:0; font-size: 1.1rem;"><i class="fas fa-meteor"></i> Global Realm</h2>
                    <small id="user-tag" style="opacity: 0.6;"></small>
                </div>
                <button id="logout-btn" style="background:none; border:none; color:#ff4d4d; cursor:pointer;"><i class="fas fa-power-off"></i></button>
            </header>

            <div id="chat-box">
                </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Escribe /albert para hablar con la IA...">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script>
        const session = JSON.parse(sessionStorage.getItem('jared_realm_session'));
        if (!session) window.location.href = 'login.html';

        document.getElementById('user-tag').innerText = `Agente: ${session.displayName}`;
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        const btn = document.getElementById('send-btn');

        function appendMsg(user, text, isAi = false) {
            const div = document.createElement('div');
            const isMe = user === session.displayName;
            div.className = `msg ${isAi ? 'ai-msg' : ''} ${isMe ? 'my-msg' : ''}`;
            div.innerHTML = `<b>${user}</b> <div>${text}</div>`;
            chatBox.appendChild(div);
            // SCROLL AUTOMÁTICO HACIA ABAJO
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // CARGAR HISTORIAL
        async function loadHistory() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) data.forEach(m => appendMsg(m.username, m.content, m.username === 'Albert AI'));
        }
        loadHistory();

        // TIEMPO REAL
        _supabase.channel('room1').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            if (payload.new.username !== session.displayName) {
                appendMsg(payload.new.username, payload.new.content, payload.new.username === 'Albert AI');
            }
        }).subscribe();

        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            appendMsg(session.displayName, text);
            input.value = '';
            await window.saveMessage(session.displayName, text);

            if (text.toLowerCase().startsWith('/albert')) {
                const prompt = text.replace('/albert', '').trim();
                // Simulación de Albert AI (Aquí pones tu fetch real a la IA)
                setTimeout(async () => {
                    const resp = "Hola " + session.displayName + ", soy Albert. Estoy procesando tu mensaje: " + (prompt || "...");
                    appendMsg('Albert AI', resp, true);
                    await window.saveMessage('Albert AI', resp);
                }, 1000);
            }
        }

        btn.onclick = handleSend;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
