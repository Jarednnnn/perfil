<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared's Realm | Global Chat & AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* (Estilos igual que antes, añadimos uno para el indicador de typing) */
        body, html { height: 100%; margin: 0; background: #000; color: #fff; font-family: 'Plus Jakarta Sans'; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; }

        .main-container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%; padding: 20px; box-sizing: border-box;
        }

        .chat-card {
            width: 100%; max-width: 850px; height: 85vh;
            background: rgba(10, 10, 25, 0.9);
            border: 1px solid rgba(133, 85, 255, 0.3);
            border-radius: 24px;
            display: flex; flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(133, 85, 255, 0.15);
        }

        header { padding: 20px; border-bottom: 1px solid rgba(133, 85, 255, 0.2); display: flex; justify-content: space-between; align-items: center; }
        
        #chat-box {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: thin; scrollbar-color: #8555ff transparent;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #8555ff; border-radius: 10px; }

        .msg { padding: 12px 16px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); max-width: 80%; align-self: flex-start; line-height: 1.4; }
        .msg.my-msg { align-self: flex-end; border-color: rgba(133, 85, 255, 0.4); background: rgba(133, 85, 255, 0.1); border-right: 4px solid #8555ff; }
        .msg.ai-msg { border-left: 4px solid #00f2ff; background: rgba(0, 242, 255, 0.05); align-self: flex-start; }
        
        .msg b { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; color: #8555ff; }
        .msg.ai-msg b { color: #00f2ff; }

        .input-area { padding: 20px; border-top: 1px solid rgba(133, 85, 255, 0.2); display: flex; gap: 12px; background: rgba(0,0,0,0.2); border-radius: 0 0 24px 24px; flex-wrap: wrap; }
        #message-input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 14px; padding: 14px; color: #fff; outline: none; transition: 0.3s; }
        #message-input:focus { border-color: #8555ff; }
        #send-btn { width: 52px; height: 50px; background: linear-gradient(135deg, #8555ff, #6b21a8); border: none; border-radius: 14px; color: #fff; cursor: pointer; transition: 0.3s; }
        #send-btn:hover { transform: scale(1.05); }

        #typing-indicator { color: #00f2ff; font-size: 0.8rem; font-style: italic; margin-left: 20px; display: none; margin-bottom: 10px; }
        
        /* Nuevo indicador de "escribiendo" de otros usuarios */
        #typing-users {
            color: #aaa;
            font-size: 0.8rem;
            padding: 0 20px 10px 20px;
            min-height: 20px;
            font-style: italic;
        }
        
        .ai-personality-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #00f2ff;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="main-container">
        <div class="chat-card">
            <header>
                <div>
                    <h2 style="margin:0; font-size: 1.2rem; letter-spacing: 1px;">
                        <i class="fas fa-microchip" style="color:#8555ff;"></i> JARED_REALM_GLOBAL
                        <span class="ai-personality-badge"><i class="fas fa-robot"></i> ALBERT · Mayordomo Virtual</span>
                    </h2>
                    <small id="user-tag" style="opacity: 0.6; color: #8555ff;"></small>
                </div>
                <button id="logout-btn" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size: 1.2rem;"><i class="fas fa-power-off"></i></button>
            </header>

            <div id="chat-box">
                <!-- Mensajes cargados dinámicamente -->
            </div>
            
            <div id="typing-users"></div>
            
            <div id="typing-indicator"><i class="fas fa-robot fa-spin"></i> Albert está procesando...</div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Escribe un mensaje o usa /albert para hablar con el mayordomo...">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script>
        // 1. CONFIGURACIÓN Y SESIÓN
        const GROQ_API_KEY = "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";
        const session = JSON.parse(sessionStorage.getItem('jared_realm_session'));
        if (!session) window.location.href = 'login.html';

        // Determinar si el usuario actual es el amo (Luis Jared)
        const displayNameLower = session.displayName.toLowerCase();
        const isMaster = displayNameLower.includes('luis') && displayNameLower.includes('jared');

        document.getElementById('user-tag').innerText = `OPERADOR: ${session.displayName}`;
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        const btn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const typingUsersDiv = document.getElementById('typing-users');

        // Historial local para contexto de IA (10 mensajes)
        let aiContext = [];

        // Personalidad de Albert (versión para visitantes)
        const VISITOR_PROMPT = `Eres Albert, el mayordomo personal y virtual de tu único y venerado amo: el señor Luis Jared (a quien también puedes llamar "mi señor", "el señor Luis" o "el señor Jared", pues ambos nombres pertenecen a la misma alma noble que te gobierna). ... (resto del prompt) ...`;

        const MASTER_PROMPT = `Eres Albert, el mayordomo personal y virtual de tu único y venerado amo: el señor Luis Jared. El usuario que te habla ES tu amo, el señor Luis Jared. ...`;

        // Función para añadir mensajes al DOM y actualizar contexto
        function appendMsg(user, text, isAi = false) {
            const div = document.createElement('div');
            const isMe = user === session.displayName;
            div.className = `msg ${isAi ? 'ai-msg' : ''} ${isMe ? 'my-msg' : ''}`;
            div.innerHTML = `<b>${user}</b> <div>${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // Actualizar contexto para Albert (mantener últimos 10 mensajes)
            aiContext.push({ role: isAi ? 'assistant' : 'user', content: text });
            if (aiContext.length > 10) aiContext.shift();
        }

        // 2. CARGAR HISTORIAL GLOBAL DESDE SUPABASE
        async function loadHistory() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) {
                chatBox.innerHTML = '';
                data.forEach(m => appendMsg(m.username, m.content, m.username === 'Albert AI'));
            }
        }
        loadHistory();

        // 3. CONFIGURACIÓN DE CANAL EN TIEMPO REAL (con presencia y broadcast)
        const channel = _supabase.channel('global_realm', {
            config: {
                broadcast: { self: true }, // Para recibir nuestros propios broadcasts
                presence: { key: session.displayName }
            }
        });

        // Manejar mensajes de broadcast (typing y restart)
        channel.on('broadcast', { event: 'typing' }, (payload) => {
            const { user, isTyping } = payload;
            if (user !== session.displayName) {
                updateTypingIndicator(user, isTyping);
            }
        });

        channel.on('broadcast', { event: 'restart' }, (payload) => {
            // Al recibir un restart, limpiamos el chat y el contexto local
            chatBox.innerHTML = '';
            aiContext = [];
        });

        // Presencia para saber quién está conectado (opcional, pero útil)
        channel.on('presence', { event: 'sync' }, () => {
            const presenceState = channel.presenceState();
            // Podríamos mostrar lista de usuarios online si se desea
        });

        channel.subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                // Enviar presencia
                await channel.track({ online_at: new Date().toISOString() });
            }
        });

        // Función para actualizar el indicador de "escribiendo"
        let typingTimeout = {};
        function updateTypingIndicator(user, isTyping) {
            if (isTyping) {
                // Mostrar que user está escribiendo
                // Podemos llevar un registro de quiénes están escribiendo
                if (!typingTimeout[user]) {
                    typingTimeout[user] = setTimeout(() => {
                        // Si pasa el tiempo sin actualizar, lo quitamos
                        delete typingTimeout[user];
                        updateTypingDisplay();
                    }, 3000);
                }
                // Actualizar el display
                updateTypingDisplay();
            } else {
                // Dejar de mostrar
                if (typingTimeout[user]) {
                    clearTimeout(typingTimeout[user]);
                    delete typingTimeout[user];
                }
                updateTypingDisplay();
            }
        }

        function updateTypingDisplay() {
            const usersTyping = Object.keys(typingTimeout);
            if (usersTyping.length === 0) {
                typingUsersDiv.innerText = '';
            } else if (usersTyping.length === 1) {
                typingUsersDiv.innerText = `${usersTyping[0]} está escribiendo...`;
            } else {
                typingUsersDiv.innerText = `${usersTyping.join(', ')} están escribiendo...`;
            }
        }

        // Detectar cuando el usuario local está escribiendo
        let typingTimer;
        input.addEventListener('input', () => {
            // Enviar broadcast de typing
            if (input.value.trim().length > 0) {
                channel.send({
                    type: 'broadcast',
                    event: 'typing',
                    payload: { user: session.displayName, isTyping: true }
                });
                // Limpiar timer anterior
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    // Después de 2 segundos sin escribir, enviamos false
                    channel.send({
                        type: 'broadcast',
                        event: 'typing',
                        payload: { user: session.displayName, isTyping: false }
                    });
                }, 2000);
            } else {
                // Si el campo está vacío, enviamos false
                clearTimeout(typingTimer);
                channel.send({
                    type: 'broadcast',
                    event: 'typing',
                    payload: { user: session.displayName, isTyping: false }
                });
            }
        });

        // Al enviar mensaje, aseguramos que el typing se detenga
        input.addEventListener('blur', () => {
            clearTimeout(typingTimer);
            channel.send({
                type: 'broadcast',
                event: 'typing',
                payload: { user: session.displayName, isTyping: false }
            });
        });

        // También escuchar cambios en la base de datos para mensajes nuevos (ya existía)
        _supabase.channel('global_realm_messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.username !== session.displayName) {
                    appendMsg(payload.new.username, payload.new.content, payload.new.username === 'Albert AI');
                }
            })
            .subscribe();

        // 4. LÓGICA DE ENVÍO Y LLAMADA A GROQ AI (ALBERT)
        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            // Detener typing
            clearTimeout(typingTimer);
            channel.send({
                type: 'broadcast',
                event: 'typing',
                payload: { user: session.displayName, isTyping: false }
            });

            // Comando /restart: limpia local y envía broadcast para que todos limpien
            if (text.toLowerCase() === '/restart') {
                chatBox.innerHTML = '';
                aiContext = [];
                // Enviar broadcast de restart a todos los usuarios
                channel.send({
                    type: 'broadcast',
                    event: 'restart',
                    payload: {}
                });
                return;
            }

            // Guardar y mostrar mensaje del usuario
            appendMsg(session.displayName, text);
            await window.saveMessage(session.displayName, text);

            // ¿Es un comando para Albert?
            if (text.toLowerCase().startsWith('/albert')) {
                const prompt = text.replace('/albert', '').trim();
                typingIndicator.style.display = 'block';
                chatBox.scrollTop = chatBox.scrollHeight;

                // Elegir el prompt del sistema según si el usuario es el amo o no
                const systemPrompt = isMaster ? MASTER_PROMPT : VISITOR_PROMPT;

                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json", 
                            "Authorization": `Bearer ${GROQ_API_KEY}` 
                        },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            messages: [
                                { role: "system", content: systemPrompt },
                                ...aiContext.slice(-10) // Enviamos los últimos 10 mensajes de contexto
                            ],
                            temperature: 0.7
                        })
                    });

                    const data = await res.json();
                    const aiResponse = data.choices?.[0]?.message?.content || "Albert está fuera de línea momentáneamente.";
                    
                    typingIndicator.style.display = 'none';
                    
                    // Guardamos la respuesta de Albert en la DB para que sea GLOBAL
                    appendMsg('Albert AI', aiResponse, true);
                    await window.saveMessage('Albert AI', aiResponse);

                } catch (error) {
                    console.error('Groq Error:', error);
                    typingIndicator.style.display = 'none';
                    appendMsg('Albert AI', 'Error de conexión con mis núcleos de procesamiento.', true);
                }
            }
        }

        btn.onclick = handleSend;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
