<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared's Realm | Global Chat & AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html { height: 100%; margin: 0; background: #000; color: #fff; font-family: 'Plus Jakarta Sans'; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; }

        .main-container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%; padding: 20px; box-sizing: border-box;
        }

        .chat-card {
            width: 100%; max-width: 850px; height: 85vh;
            background: rgba(10, 10, 25, 0.9);
            border: 1px solid rgba(133, 85, 255, 0.3);
            border-radius: 24px;
            display: flex; flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(133, 85, 255, 0.15);
        }

        header { padding: 20px; border-bottom: 1px solid rgba(133, 85, 255, 0.2); display: flex; justify-content: space-between; align-items: center; }
        
        #chat-box {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: thin; scrollbar-color: #8555ff transparent;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #8555ff; border-radius: 10px; }

        .msg { padding: 12px 16px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); max-width: 80%; align-self: flex-start; line-height: 1.4; }
        .msg.my-msg { align-self: flex-end; border-color: rgba(133, 85, 255, 0.4); background: rgba(133, 85, 255, 0.1); border-right: 4px solid #8555ff; }
        .msg.ai-msg { border-left: 4px solid #00f2ff; background: rgba(0, 242, 255, 0.05); align-self: flex-start; }
        
        .msg b { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; color: #8555ff; }
        .msg.ai-msg b { color: #00f2ff; }

        .input-area { padding: 20px; border-top: 1px solid rgba(133, 85, 255, 0.2); display: flex; gap: 12px; background: rgba(0,0,0,0.2); border-radius: 0 0 24px 24px; }
        #message-input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 14px; padding: 14px; color: #fff; outline: none; transition: 0.3s; }
        #message-input:focus { border-color: #8555ff; }
        #send-btn { width: 52px; height: 50px; background: linear-gradient(135deg, #8555ff, #6b21a8); border: none; border-radius: 14px; color: #fff; cursor: pointer; transition: 0.3s; }
        #send-btn:hover { transform: scale(1.05); }

        #typing-indicator { color: #00f2ff; font-size: 0.8rem; font-style: italic; margin-left: 20px; display: none; margin-bottom: 10px; }
        
        /* Indicador de "escribiendo" para otros usuarios */
        .typing-notice {
            color: #8555ff;
            font-size: 0.8rem;
            font-style: italic;
            padding: 5px 20px;
            background: rgba(133, 85, 255, 0.1);
            border-radius: 20px;
            align-self: flex-start;
            margin-bottom: 5px;
            display: inline-block;
        }
        
        .ai-personality-badge {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #00f2ff;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="main-container">
        <div class="chat-card">
            <header>
                <div>
                    <h2 style="margin:0; font-size: 1.2rem; letter-spacing: 1px;">
                        <i class="fas fa-microchip" style="color:#8555ff;"></i> JARED_REALM_GLOBAL
                        <span class="ai-personality-badge"><i class="fas fa-robot"></i> ALBERT · Mayordomo Virtual</span>
                    </h2>
                    <small id="user-tag" style="opacity: 0.6; color: #8555ff;"></small>
                </div>
                <button id="logout-btn" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size: 1.2rem;"><i class="fas fa-power-off"></i></button>
            </header>

            <div id="chat-box">
                <!-- Mensajes cargados dinámicamente -->
            </div>
            
            <div id="typing-indicator"><i class="fas fa-robot fa-spin"></i> Albert está procesando...</div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Escribe un mensaje o usa /albert para hablar con el mayordomo...">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
    <script>
        // CONFIGURACIÓN INICIAL
        const session = JSON.parse(sessionStorage.getItem('jared_realm_session'));
        if (!session) window.location.href = 'login.html';

        const displayNameLower = session.displayName.toLowerCase();
        const isMaster = displayNameLower.includes('luis') && displayNameLower.includes('jared');

        document.getElementById('user-tag').innerText = `OPERADOR: ${session.displayName}`;
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        const btn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        let aiContext = [];
        const typingTimeouts = {};

        // Prompts (igual que antes)
        const VISITOR_PROMPT = `Eres Albert...`; // (mantén el prompt completo que ya tenías)
        const MASTER_PROMPT = `Eres Albert...`; // (ídem)

        // Función para añadir mensajes
        function appendMsg(user, text, isAi = false) {
            const div = document.createElement('div');
            const isMe = user === session.displayName;
            div.className = `msg ${isAi ? 'ai-msg' : ''} ${isMe ? 'my-msg' : ''}`;
            div.innerHTML = `<b>${user}</b> <div>${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            aiContext.push({ role: isAi ? 'assistant' : 'user', content: text });
            if (aiContext.length > 10) aiContext.shift();
        }

        // Funciones de typing (igual)
        function showTypingIndicator(username) {
            const existing = document.getElementById(`typing-${username}`);
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.id = `typing-${username}`;
            div.className = 'typing-notice';
            div.innerHTML = `<i class="fas fa-pencil-alt"></i> ${username} está escribiendo...`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTypingIndicator(username) {
            const existing = document.getElementById(`typing-${username}`);
            if (existing) existing.remove();
        }

        // Cargar historial
        async function loadHistory() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) {
                chatBox.innerHTML = '';
                data.forEach(m => appendMsg(m.username, m.content, m.username === 'Albert AI'));
            }
        }
        loadHistory();

        // Configurar canal de Supabase (igual)
        const channel = _supabase.channel('global_realm', { config: { broadcast: { self: false } } });
        channel.on('broadcast', { event: 'new_message' }, ({ payload }) => {
            if (payload.username !== session.displayName) {
                appendMsg(payload.username, payload.content, payload.username === 'Albert AI');
            }
        });
        channel.on('broadcast', { event: 'restart' }, () => {
            chatBox.innerHTML = '';
            aiContext = [];
        });
        channel.on('broadcast', { event: 'typing_start' }, ({ payload }) => {
            if (payload.username === session.displayName) return;
            showTypingIndicator(payload.username);
            if (typingTimeouts[payload.username]) clearTimeout(typingTimeouts[payload.username]);
            typingTimeouts[payload.username] = setTimeout(() => {
                hideTypingIndicator(payload.username);
                delete typingTimeouts[payload.username];
            }, 2000);
        });
        channel.on('broadcast', { event: 'typing_stop' }, ({ payload }) => {
            if (payload.username === session.displayName) return;
            hideTypingIndicator(payload.username);
            if (typingTimeouts[payload.username]) {
                clearTimeout(typingTimeouts[payload.username]);
                delete typingTimeouts[payload.username];
            }
        });
        channel.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            if (payload.new.username !== session.displayName) {
                appendMsg(payload.new.username, payload.new.content, payload.new.username === 'Albert AI');
            }
        });
        channel.subscribe();

        // Lógica de typing local
        let typingTimer = null;
        const TYPING_TIMEOUT = 2000;
        function sendTypingStart() {
            channel.send({ type: 'broadcast', event: 'typing_start', payload: { username: session.displayName } });
        }
        function sendTypingStop() {
            channel.send({ type: 'broadcast', event: 'typing_stop', payload: { username: session.displayName } });
        }
        input.addEventListener('input', () => {
            if (input.value.length === 1) sendTypingStart();
            if (typingTimer) clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                if (input.value.trim() !== '') sendTypingStop();
            }, TYPING_TIMEOUT);
        });
        input.addEventListener('blur', () => {
            if (typingTimer) clearTimeout(typingTimer);
            if (input.value.trim() !== '') sendTypingStop();
        });

        // Manejo del envío (MODIFICADO: usa text/plain)
        async function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            if (typingTimer) clearTimeout(typingTimer);
            sendTypingStop();
            input.value = '';

            if (text.toLowerCase() === '/restart') {
                channel.send({ type: 'broadcast', event: 'restart', payload: {} });
                chatBox.innerHTML = '';
                aiContext = [];
                return;
            }

            appendMsg(session.displayName, text);
            await window.saveMessage(session.displayName, text);
            channel.send({ type: 'broadcast', event: 'new_message', payload: { username: session.displayName, content: text } });

            if (text.toLowerCase().startsWith('/albert')) {
                const promptText = text.replace('/albert', '').trim();
                typingIndicator.style.display = 'block';
                chatBox.scrollTop = chatBox.scrollHeight;

                const systemPrompt = isMaster ? MASTER_PROMPT : VISITOR_PROMPT;

                // Construir mensajes para Groq
                const messages = [
                    { role: 'system', content: systemPrompt },
                    ...aiContext.slice(-10)
                ];

                try {
                    // Usamos Content-Type: text/plain para evitar el preflight CORS
                    const res = await fetch('https://script.google.com/macros/library/d/14ga5JYrpeBCYxxB9Vm7rspWbUvA25073WGMR8a9g9hvpxXO6V1dNdmhb/2', {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' }, // <-- CAMBIO CLAVE
                        body: JSON.stringify({ messages }) // El body sigue siendo JSON, pero el Content-Type es text/plain
                    });

                    // Leer la respuesta como JSON (el script devuelve JSON)
                    const data = await res.json();
                    
                    let aiResponse;
                    if (data.choices && data.choices[0] && data.choices[0].message) {
                        aiResponse = data.choices[0].message.content;
                    } else {
                        aiResponse = "Albert no entendió la respuesta del servidor.";
                        console.error('Respuesta inesperada:', data);
                    }

                    typingIndicator.style.display = 'none';
                    
                    appendMsg('Albert AI', aiResponse, true);
                    await window.saveMessage('Albert AI', aiResponse);
                    channel.send({ type: 'broadcast', event: 'new_message', payload: { username: 'Albert AI', content: aiResponse } });

                } catch (error) {
                    console.error('Error detallado:', error);
                    typingIndicator.style.display = 'none';
                    appendMsg('Albert AI', 'Error de conexión: ' + error.message, true);
                }
            }
        }

        btn.onclick = handleSend;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
