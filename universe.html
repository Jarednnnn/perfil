<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jared Realm - Universe Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow: hidden;
            background: #000;
            padding: 0;
            margin: 0;
        }
        #game-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
        }
        .back-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game-bg"></div>
    <div id="particles-js"></div>

    <div class="back-nav">
        <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Volver al Dashboard</a>
    </div>

    <div id="universe-ui" style="position: relative; z-index: 10;">
        <!-- Auth View -->
        <div id="auth-view" class="modal-card" style="margin: 10vh auto;">
            <h2 id="auth-title">Entrar al Universo</h2>
            <form id="auth-form">
                <input type="text" id="auth-email" placeholder="Usuario" required>
                <input type="password" id="auth-pass" placeholder="Password" required>
                <div class="form-actions">
                    <button type="submit" class="main-action-btn">Login</button>
                </div>
            </form>
        </div>

        <!-- Game HUD -->
        <div id="game-hud" class="hidden" style="display: none; flex-direction: column; width: 95vw; height: 95vh; margin: 2.5vh auto; gap: 1rem;">
            <div class="hud-top">
                <div class="hud-item"><i class="fas fa-coins"></i> <span id="hud-credits">100</span></div>
                <div class="hud-item"><i class="fas fa-gas-pump"></i> <span id="hud-fuel">50</span>%</div>
                <div class="hud-item"><i class="fas fa-user"></i> <span id="user-display">Invitado</span></div>
            </div>
            <div class="hud-center" style="background: rgba(0,0,0,0.6); border-radius: 20px; border: 1px solid var(--card-border); flex: 1; position: relative;">
                <canvas id="galaxy-canvas"></canvas>
            </div>
            <div class="hud-bottom">
                <div id="location-text">Navegando: Espacio Profundo</div>
            </div>
        </div>

        <!-- Planet Detail Modal -->
        <div id="planet-modal" class="modal-card hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; display: none;">
            <button class="close-btn" style="position: sticky; top: 10px; float: right;">&times;</button>
            <div id="planet-canvas-container" style="height: 200px; margin-bottom: 1rem;"></div>
            <h3 id="planet-name" style="margin-top: 0.5rem;">Planeta Progresivo</h3>
            <p id="planet-desc" style="font-size: 0.9rem; margin-bottom: 1rem;">Cargando datos de la IA...</p>
            
            <div class="planet-qa" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 1rem;">
                <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 8px;">Siri Espacial (Pregunta al Planeta):</p>
                <div id="qa-response" style="font-size: 0.85rem; margin-bottom: 10px; min-height: 20px; border-left: 2px solid #8555ff; padding-left: 10px; line-height: 1.4;">¿Qué quieres saber?</div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="qa-input" placeholder="¿Qué hacer aquí?" style="flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; color: #fff; font-size: 0.9rem;">
                    <button id="qa-send" style="background: #8555ff; border: none; border-radius: 8px; padding: 0 15px; color: #fff; cursor: pointer;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div class="planet-actions" style="display: flex; gap: 10px;">
                <button id="visit-planet" class="main-action-btn" style="flex: 1;">Aterrizar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="game.js"></script>
    <script>
        // Start particles on this page too
        if(window.particlesJS) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#8555ff" },
                    "opacity": { "value": 0.5, "random": true },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": false },
                    "move": { "enable": true, "speed": 0.5, "direction": "none", "random": true }
                }
            });
        }
    </script>
</body>
</html>
